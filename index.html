<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://use.typekit.net/fdn2awi.css">

<body>
    <div class="page-wrapper"><header>
        <div>
            <h1 class="logo">Hurtado Design</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#work" class="nav-link">work</a></li>
                <li><a href="#projects" class="nav-link">projects</a></li>

        <div class="box"><a href="#contact">contact</a></div>

        <main>
            <section id="landing">

                    <div class="circle"><img src="images/headshot-OFS-clean.png" alt="" width="150"></div>
